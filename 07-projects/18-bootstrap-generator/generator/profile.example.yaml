# Example profile.yaml — a fictional persona, to show the shape the brain produces.
# Real profiles are written field-by-field by `wsx profile set`, not by hand.
# Stays within the YAML subset in wsxlib/yamlio.py (maps, scalars, inline lists).

schema_version: "0.2"
identity:
  name: Maya Okafor
  handle: maya
surfaces:
  primary: claude
  agents: [claude, cursor]
  machines: [laptop, phone]
models:
  tier: frontier
  offline: false
transport:
  type: git
  remote: ""
contexts:
  work:
    role: "UX researcher at a healthcare startup"
    summary: "Runs studies, synthesizes findings, briefs product + design."
  professional:
    crafts: [user-research, data-storytelling, accessibility]
  personal:
    private: true
    interests: [film-photography, trail-running, language-learning]
preferences:
  tone: "lead with the answer; flag tradeoffs; no preamble"
  verbosity: concise
  audience: "designer, not engineer"
  banned: ["this isnt X its Y constructions"]
lifecycle:
  continuity: true
  separation: walled
  automation: standard
privacy:
  personal_local_only: true   # the guarantee wsx actually keeps (gitignored + never emitted)
imports: ["github.com/maya/research-templates"]
