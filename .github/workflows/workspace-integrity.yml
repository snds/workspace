name: workspace-integrity

# The write-quality / continuity / anti-zombie gates that let ANY agent write safely:
#  - validate-workspace.py: archive provenance + memory-index coverage
#  - validate-integrity.py: name==dir, cross-link continuity (no dangling wikilinks),
#    no superseded-but-live files, no unfilled scaffold/stub tokens, quality smells
# See 01-frameworks/08-workspace-contribution-framework.md → "Write-quality gates".

on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - "_archive/**"
      - "06-context/memory/**"
      - "09-tools/validate-workspace.py"
      - "09-tools/validate-integrity.py"
  pull_request:
    paths:
      - "**/*.md"
      - "_archive/**"
      - "06-context/memory/**"
      - "09-tools/validate-workspace.py"
      - "09-tools/validate-integrity.py"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Archive provenance + memory index
        run: python3 09-tools/validate-workspace.py
      - name: Write-quality + cross-link continuity + anti-zombie
        run: python3 09-tools/validate-integrity.py
