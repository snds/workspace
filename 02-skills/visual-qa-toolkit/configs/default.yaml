# ────────────────────────────────────────────────────────────────────
# Default config for the visual-qa-toolkit.
# Safe starting point. Copy this and tune per project.
# ────────────────────────────────────────────────────────────────────

project_name: Default

# If present, only these checks run. Comment out to run everything enabled
# per-section (opt-out via `enabled: false` in each section instead).
#
# enabled_checks:
#   - alignment
#   - spacing
#   - contrast
#   - color_extraction
#   - visual_diff
#   - color_vision
#   - icon_consistency
#   - typography
#   - grid_overlay
#   - state_comparison

# ─── Alignment ──────────────────────────────────────────────────────
alignment:
  tolerance_px: 1            # edges off by more than this from cluster median → flag
  cluster_tolerance_px: 4    # edges within this distance considered "the same axis"
  min_cluster_size: 2        # need ≥ N elements on an axis before flagging deviations
  min_element_area: 400
  max_element_area_pct: 0.5
  edges_to_check: [left, right, top, bottom]

# ─── Spacing ────────────────────────────────────────────────────────
spacing:
  base_scale: [4, 8, 12, 16, 24, 32, 48, 64]
  tolerance_px: 2
  min_element_area: 400
  max_element_area_pct: 0.5
  max_gap_px: 200
  min_gap_px: 2
  overlap_threshold_pct: 0.3

# ─── Contrast ───────────────────────────────────────────────────────
contrast:
  standard: WCAG_AA          # WCAG_AA | WCAG_AAA
  text_size: body            # body (≥4.5:1) | large (≥3.0:1)
  auto_detect: true
  min_region_area: 200
  max_region_area_pct: 0.2
  sample_inner_margin: 2

  # Or specify explicit text regions for precise auditing:
  # text_regions:
  #   - {bbox: [40, 80, 200, 24], label: page_title}
  #   - {bbox: [40, 120, 400, 16], label: body_copy}

# ─── Color extraction (palette drift) ───────────────────────────────
color_extraction:
  # palette_path: ./configs/tokens/default-palette.json
  delta_e_threshold: 5.0
  delta_e_ideal: 2.3
  auto_detect: true
  auto_detect_count: 12
  sample_radius: 3

  # Or specify points to sample:
  # sample_points:
  #   - {point: [120, 48], label: header_bg}
  #   - {point: [480, 240], label: primary_cta_bg}

# ─── Visual diff ────────────────────────────────────────────────────
visual_diff:
  reference_path: null       # required — path to reference image
  ssim_threshold: 0.95
  pixel_diff_threshold: 25
  min_region_area: 200
  dilation_iterations: 3
  overlay_alpha: 0.5

# ─── Color vision (CVD simulation) ──────────────────────────────────
color_vision:
  simulations: [deuteranopia, protanopia, tritanopia]
  dominant_color_count: 8
  distinct_original_threshold: 10.0
  collapse_threshold: 4.0
  min_area_pct: 0.5

# ─── Typography ─────────────────────────────────────────────────────
typography:
  type_scale_px: [12, 14, 16, 20, 24, 32, 40, 48]
  tolerance_px: 2
  auto_detect: true
  min_region_area: 150
  max_region_area_pct: 0.1
  min_height_px: 8
  max_height_px: 120

# ─── Grid overlay (visualization only) ──────────────────────────────
grid_overlay:
  columns: 12
  column_width_px: null       # auto-compute from canvas, gutter, margin
  gutter_px: 24
  margin_px: 48
  baseline_px: 8              # 0 to disable
  ruler_spacing_px: 50
  ruler_major_spacing_px: 100
  column_fill_alpha: 0.08
  draw_column_fill: true
  draw_column_edges: true
  draw_baseline: true
  draw_ruler: true

# ─── Icon consistency ───────────────────────────────────────────────
icon_consistency:
  canvas_size: 24
  extensions: [.png]
  background_threshold: 240
  alpha_threshold: 10
  bbox_size_stdev_threshold: 2.0
  weight_stdev_threshold: 2.0
  stroke_stdev_threshold: 2.0
  max_icons_in_grid: 64

# ─── State comparison ───────────────────────────────────────────────
state_comparison:
  extensions: [.png, .jpg, .jpeg]
  expected_states: [default, hover, focus, active, disabled]
  min_ssim_delta: 0.02
  critical_pairs:
    - [default, hover]
    - [default, focus]
    - [default, active]
    - [default, disabled]
  critical_min_delta: 0.04
  resize_to_smallest: true
